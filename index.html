<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartList Pro</title>
    
    <!-- Подключение стилей и библиотек -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e1b4b;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* Корпус телефона */
        .app-frame {
            width: 100%; max-width: 430px; height: 95vh;
            background: white; border: 8px solid #0f172a; border-radius: 45px;
            position: relative; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Индиго-хедер как на скрине */
        .header {
            background-color: #6366f1; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; color: white;
        }

        .header-btns { display: flex; gap: 8px; }
        .circle-btn {
            width: 36px; height: 36px; background: rgba(255, 255, 255, 0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .circle-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.4); }

        /* Поле ввода с обводкой */
        .search-container { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .input-box {
            border: 2px solid #e2e8f0; border-radius: 14px;
            display: flex; align-items: center; padding: 0 12px; height: 50px; background: white;
        }
        .input-box:focus-within { border-color: #6366f1; }

        .icon-action {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }

        /* Слайдер с кнопками */
        .slider {
            display: flex; overflow-x: auto; gap: 10px; padding: 12px 15px; background: white;
        }
        .slider::-webkit-scrollbar { display: none; }
        .chip {
            background: #f1f5f9; padding: 10px 16px; border-radius: 14px;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
            font-weight: 600; color: #334155; white-space: nowrap;
            cursor: pointer; border: 1px solid #e2e8f0;
        }

        /* Список */
        .main-list { flex-grow: 1; overflow-y: auto; background: white; position: relative; }
        .empty-state { margin-top: 100px; text-align: center; color: #94a3b8; }
        
        .card { margin: 15px; border: 2px solid #f1f5f9; border-radius: 20px; overflow: hidden; }
        .card-title { background: #f8fafc; padding: 10px 15px; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        .item-row { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid #f1f5f9; }
        .item-row.checked { opacity: 0.4; text-decoration: line-through; }

        /* Плавающие кнопки */
        .fab-wrap { position: absolute; bottom: 30px; right: 25px; display: flex; flex-direction: column; gap: 12px; }
        .fab { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 15px rgba(0,0,0,0.1); cursor: pointer; }

        /* Модалка рецепта */
        #recipeModal {
            position: absolute; bottom: 0; left: 0; right: 0; background: white; height: 85%;
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); padding: 30px;
        }
        #recipeModal.active { transform: translateY(0); }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-frame">
    <!-- Header -->
    <header class="header">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-cart-shopping text-2xl"></i>
            <span class="text-xl font-extrabold">SmartList Pro</span>
        </div>
        <div class="header-btns">
            <div onclick="clearList()" class="circle-btn"><i class="fa-solid fa-trash-can"></i></div>
            <div onclick="shareList()" class="circle-btn"><i class="fa-solid fa-user-group"></i></div>
            <div onclick="alert('Отчеты доступны в Premium')" class="circle-btn"><i class="fa-solid fa-chart-line"></i></div>
        </div>
    </header>

    <!-- Search Section -->
    <div class="search-container">
        <div class="flex gap-2">
            <div class="input-box flex-grow">
                <i class="fa-solid fa-magnifying-glass text-slate-400 mr-3 text-sm"></i>
                <input type="text" id="mainInput" placeholder="Товар или «Рецепт: борщ»" class="w-full outline-none text-sm font-medium">
            </div>
            <div onclick="simulateVoice()" class="icon-action bg-amber-100 text-amber-500"><i class="fa-solid fa-microphone"></i></div>
            <div onclick="getRecipe()" class="icon-action bg-sky-100 text-sky-500"><i class="fa-solid fa-wand-sparkles"></i></div>
            <div onclick="addItem()" class="icon-action bg-indigo-600 text-white"><i class="fa-solid fa-plus"></i></div>
        </div>
    </div>

    <!-- Chips Slider -->
    <div class="slider">
        <div onclick="quickAdd('Торт Наполеон')" class="chip"><i class="fa-solid fa-cake-candles"></i> Торт Наполеон</div>
        <div onclick="quickAdd('Борщ')" class="chip"><i class="fa-solid fa-bowl-food"></i> Борщ</div>
        <div onclick="quickAdd('Уборка')" class="chip"><i class="fa-solid fa-broom"></i> Уборка</div>
        <div onclick="quickAdd('Завтрак')" class="chip"><i class="fa-solid fa-egg"></i> Завтрак</div>
    </div>

    <!-- Content -->
    <div class="main-list">
        <div id="emptyView" class="empty-state">
            <i class="fa-solid fa-cart-flatbed text-6xl opacity-10 mb-4 block mx-auto"></i>
            <p class="text-lg font-bold text-slate-800">Список пуст</p>
            <p class="text-sm text-slate-400 px-10">Введите товар или выберите шаблон выше</p>
        </div>
        <div id="listView"></div>
    </div>

    <!-- Floating Buttons -->
    <div class="fab-wrap">
        <div class="fab bg-indigo-400" onclick="alert('Настройки темы')"><i class="fa-solid fa-gear"></i></div>
        <div class="fab bg-indigo-500" onclick="alert('Помощь')"><i class="fa-solid fa-question"></i></div>
    </div>

    <!-- Recipe View -->
    <div id="recipeModal">
        <div class="flex justify-between items-center mb-6">
            <h2 id="recipeTitle" class="text-2xl font-black">Название</h2>
            <div onclick="closeRecipe()" class="text-2xl p-2 cursor-pointer">✕</div>
        </div>
        <div id="recipeBody" class="overflow-y-auto h-full pr-2 text-slate-600 leading-relaxed"></div>
    </div>
</div>

<script>
    // --- 1. ПРАВИЛЬНОЕ ПОДКЛЮЧЕНИЕ БАЗЫ ---
    const supabaseUrl = 'https://frawcmyjmkzntakwjiov.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyYXdjbXlqbWt6bnRha3dqaW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODEyNDMsImV4cCI6MjA5MzQ1NzI0M30.qcp517sZD4LoyxZQ7J-seuG-HuTNqIkAtYi2RSp8ytA';
    
    let supabase;
    try {
        if (window.supabase) {
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        }
    } catch(e) { console.error("Database connection failed"); }

    const urlParams = new URLSearchParams(window.location.search);
    let currentId = urlParams.get('list');

    window.onload = () => {
        if (currentId) loadFromCloud();
    };

    // --- 2. ФУНКЦИИ КНОПОК (ГЛОБАЛЬНЫЕ) ---

    async function quickAdd(name) {
        document.getElementById('mainInput').value = `Рецепт: ${name}`;
        await getAIList(name);
    }

    async function addItem() {
        const input = document.getElementById('mainInput');
        const val = input.value.trim();
        if (!val) return;

        if (val.toLowerCase().includes('рецепт')) {
            await getAIList(val.replace('Рецепт:', '').trim());
        } else {
            renderSingle(val, "Разное");
        }
        input.value = '';
    }

    async function getAIList(topic) {
        const empty = document.getElementById('emptyView');
        const list = document.getElementById('listView');
        empty.style.display = 'none';
        list.innerHTML = `<div class="p-10 text-center"><div class="loader mx-auto"></div><p class="mt-4 text-indigo-600 font-bold uppercase text-[10px]">ИИ подбирает товары...</p></div>`;

        try {
            const prompt = `Верни ТОЛЬКО JSON: {"Категория": ["Товар1", "Товар2"]} для темы: ${topic}`;
            // Используем стабильную модель openai
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&json=true`);
            const data = await res.json();
            renderAll(data);
            saveToCloud(data);
        } catch (e) {
            console.error(e);
            alert("ИИ временно недоступен. Проверьте интернет.");
            empty.style.display = 'block';
            list.innerHTML = '';
        }
    }

    function renderAll(data) {
        const list = document.getElementById('listView');
        list.innerHTML = '';
        document.getElementById('emptyView').style.display = 'none';

        for (const [cat, items] of Object.entries(data)) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-title">${cat}</div>`;
            
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <input type="checkbox" class="w-6 h-6 rounded border-slate-300" onchange="this.parentElement.classList.toggle('checked')">
                    <span class="ml-4 flex-grow font-semibold text-slate-700 text-sm">${item}</span>
                    <i class="fa-solid fa-trash-can text-slate-200 cursor-pointer p-2 hover:text-red-500" onclick="this.parentElement.remove(); checkEmpty();"></i>
                `;
                card.appendChild(row);
            });
            list.appendChild(card);
        }
    }

    function renderSingle(name, cat) {
        document.getElementById('emptyView').style.display = 'none';
        const list = document.getElementById('listView');
        
        let card = document.querySelector('.card');
        if (!card) {
            card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-title">${cat}</div>`;
            list.appendChild(card);
        }

        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <input type="checkbox" class="w-6 h-6 rounded border-slate-300" onchange="this.parentElement.classList.toggle('checked')">
            <span class="ml-4 flex-grow font-semibold text-slate-700 text-sm">${name}</span>
            <i class="fa-solid fa-trash-can text-slate-200 cursor-pointer p-2" onclick="this.parentElement.remove(); checkEmpty();"></i>
        `;
        card.appendChild(row);
    }

    async function getRecipe() {
        const dish = document.getElementById('mainInput').value.replace('Рецепт:', '').trim();
        if(!dish) return alert("Введите блюдо для рецепта");

        const modal = document.getElementById('recipeModal');
        const body = document.getElementById('recipeBody');
        document.getElementById('recipeTitle').innerText = dish;
        body.innerHTML = `<div class="py-10 text-center"><div class="loader mx-auto"></div><p class="mt-4">Ищем лучший рецепт...</p></div>`;
        modal.classList.add('active');

        try {
            const res = await fetch(`https://text.pollinations.ai/Подробный рецепт ${dish} на русском языке?model=openai`);
            body.innerHTML = await res.text();
        } catch (e) { body.innerHTML = "Ошибка загрузки рецепта."; }
    }

    // --- 3. СИСТЕМНАЯ ЛОГИКА ---

    function checkEmpty() {
        const list = document.getElementById('listView');
        if (list.innerText.trim() === "") {
            document.getElementById('emptyView').style.display = 'block';
        }
    }

    async function saveToCloud(data) {
        if(!supabase) return;
        if(!currentId) {
            currentId = 'list_' + Math.random().toString(36).substr(2, 9);
            window.history.pushState({}, '', '?list=' + currentId);
        }
        await supabase.from('shopping_lists').upsert([{ share_id: currentId, items: data }], { onConflict: 'share_id' });
    }

    async function loadFromCloud() {
        const { data } = await supabase.from('shopping_lists').select('items').eq('share_id', currentId).single();
        if(data) renderAll(data.items);
    }

    function clearList() { if(confirm('Очистить весь список?')) location.href = window.location.pathname; }
    function closeRecipe() { document.getElementById('recipeModal').classList.remove('active'); }
    function simulateVoice() { 
        const v = prompt('Ваш голосовой запрос:'); 
        if(v) { document.getElementById('mainInput').value = v; addItem(); } 
    }
    function shareList() { 
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => alert('Ссылка скопирована! Отправьте её родным.'));
    }
</script>

</body>
</html>
