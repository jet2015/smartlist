	const supabase = supabase.createClient(supabaseUrl, supabaseKey);

let currentShareId = new URLSearchParams(window.location.search).get('list');

// Инициализация при загрузке
document.addEventListener('DOMContentLoaded', async () => {
    renderQuickButtons();
    if (currentShareId) {
        loadListFromCloud(currentShareId);
    }
});

// Сохранение в облако
async function saveToCloud(data) {
    if (!currentShareId) {
        currentShareId = 'list_' + Math.random().toString(36).substr(2, 9);
        window.history.pushState({}, '', '?list=' + currentShareId);
    }

    const { error } = await supabase
        .from('shopping_lists')
        .upsert([{ share_id: currentShareId, items: data }], { onConflict: 'share_id' });

    if (error) console.error('Ошибка сохранения:', error);
}

// Загрузка из облака
async function loadListFromCloud(id) {
    const { data, error } = await supabase
        .from('shopping_lists')
        .select('items')
        .eq('share_id', id)
        .single();

    if (data) {
        updateList(data.items, false); // false чтобы не зациклить сохранение
    }
}

// Функция обновления списка (дополнена сохранением)
function updateList(data, shouldSave = true) {
    const container = document.getElementById('shoppingList');
    container.innerHTML = '';
    
    for (const [category, items] of Object.entries(data)) {
        const catDiv = document.createElement('div');
        catDiv.innerHTML = `<div class="category-header">${category}</div>`;
        
        items.forEach(item => {
            const itemRow = document.createElement('div');
            itemRow.className = 'item-row';
            itemRow.innerHTML = `
                <input type="checkbox" class="w-5 h-5" onchange="toggleItem(this)">
                <span class="item-text ml-3 flex-grow">${item}</span>
            `;
            catDiv.appendChild(itemRow);
        });
        container.appendChild(catDiv);
    }
    
    if (shouldSave) saveToCloud(data);
}

// Функция "Поделиться"
function shareList() {
    const url = window.location.href;
    navigator.clipboard.writeText(url);
    alert('Ссылка на этот список скопирована! Отправь её родным: ' + url);
}

	</script>
	
	
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .category-header {
            background: #f8fafc;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .item-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s;
        }

        .item-row.completed {
            opacity: 0.5;
        }

        .item-row.completed .item-text {
            text-decoration: line-through;
        }

        .quick-btn {
            white-space: nowrap;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .quick-btn:active {
            transform: scale(0.95);
        }

        /* Bottom Sheet Style */
        #recipeModal {
            transition: transform 0.3s ease-out;
            transform: translateY(100%);
            z-index: 50;
        }

        #recipeModal.active {
            transform: translateY(0);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .premium-badge {
            background: linear-gradient(90deg, #f59e0b, #d97706);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <!-- Header -->
    <header class="p-4 border-bottom flex justify-between items-center bg-white sticky top-0 z-10 shadow-sm">
        <div>
            <h1 class="text-xl font-bold text-slate-800">SmartList</h1>
            <p class="text-xs text-slate-500">Пробный период: <span class="text-orange-500 font-bold">7 дней</span></p>
        </div>
        <button onclick="shareList()" class="text-blue-600 p-2">
            <i class="fa-solid fa-user-plus text-lg"></i>
        </button>
    </header>

    <!-- Search Area -->
    <div class="p-4 bg-white">
        <div class="relative flex items-center gap-2">
            <div class="relative flex-grow">
                <input type="text" id="mainInput" 
                    placeholder="Что купить или какой рецепт?" 
                    class="w-full bg-slate-100 border-none rounded-xl py-3 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-slate-400"></i>
            </div>
            <button id="showRecipeBtn" onclick="getRecipe()" 
                class="hidden bg-green-500 text-white px-4 py-3 rounded-xl font-semibold shadow-md active:bg-green-600 transition-all">
                Показать
            </button>
        </div>

        <!-- Quick Actions -->
        <div class="mt-4 overflow-x-auto no-scrollbar">
            <div id="quickButtons" class="flex gap-2 pb-2">
                <!-- Buttons injected by JS -->
            </div>
        </div>
    </div>

    <!-- Trial Info -->
    <div id="trialBanner" class="mx-4 mb-4 p-3 bg-blue-50 rounded-lg border border-blue-100 flex items-center justify-between">
        <span class="text-sm text-blue-800">Premium-версия доступна</span>
        <button class="premium-badge">АКТИВИРОВАТЬ</button>
    </div>

    <!-- Shopping List -->
    <div id="shoppingList" class="flex-grow pb-24">
        <!-- Categories and items will be here -->
        <div id="emptyState" class="text-center py-20 text-slate-400">
            <i class="fa-solid fa-basket-shopping text-5xl mb-4 opacity-20"></i>
            <p>Список пока пуст</p>
            <p class="text-xs">Нажмите на кнопку или скажите голосом</p>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="fixed bottom-0 max-w-[450px] w-full bg-white border-t p-4 flex justify-between items-center shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <button onclick="clearList()" class="flex flex-col items-center text-slate-400 hover:text-red-500 transition-colors">
            <i class="fa-solid fa-trash-can text-xl"></i>
            <span class="text-[10px] mt-1">Очистить</span>
        </button>
        
        <button onclick="simulateVoice()" class="bg-blue-600 w-14 h-14 rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition-all -mt-10 border-4 border-white">
            <i id="micIcon" class="fa-solid fa-microphone text-xl"></i>
        </button>

        <button onclick="toggleAddButton()" class="flex flex-col items-center text-slate-400 hover:text-blue-600 transition-colors">
            <i class="fa-solid fa-circle-plus text-xl"></i>
            <span class="text-[10px] mt-1">Добавить кнопку</span>
        </button>
    </div>

    <!-- Recipe Modal (Bottom Sheet) -->
    <div id="recipeModal" class="fixed inset-x-0 bottom-0 max-w-[450px] mx-auto bg-white rounded-t-3xl shadow-2xl h-[80vh] flex flex-col overflow-hidden">
        <div class="h-1.5 w-12 bg-slate-300 rounded-full mx-auto mt-3 mb-2"></div>
        <div class="p-6 overflow-y-auto">
            <div class="flex justify-between items-start mb-4">
                <h2 id="recipeTitle" class="text-2xl font-bold text-slate-800">Название рецепта</h2>
                <button onclick="closeRecipe()" class="bg-slate-100 rounded-full p-2 w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="recipeContent" class="text-slate-600 leading-relaxed space-y-4">
                <!-- Recipe text will be here -->
            </div>
        </div>
    </div>
</div>

<script>
    let shoppingData = {};
    let quickButtons = ['Борщ', 'Плов', 'Шашлык', 'Оливье', 'Завтрак', 'Уборка'];
    
    // Инициализация при загрузке
    document.addEventListener('DOMContentLoaded', () => {
        renderQuickButtons();
        loadFromHistory();
        
        // Следим за вводом для кнопки "Показать"
        document.getElementById('mainInput').addEventListener('input', (e) => {
            const btn = document.getElementById('showRecipeBtn');
            if (e.target.value.toLowerCase().includes('рецепт')) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        });
    });

    // Отрисовка кнопок быстрого доступа
    function renderQuickButtons() {
        const container = document.getElementById('quickButtons');
        container.innerHTML = quickButtons.map(name => `
            <button onclick="handleQuickAction('${name}')" 
                class="quick-btn px-5 py-2 bg-white rounded-full text-sm font-medium text-slate-700 shadow-sm hover:bg-blue-50 hover:text-blue-600">
                ${name}
            </button>
        `).join('');
    }

    // Обработка нажатия на быструю кнопку
    async function handleQuickAction(name) {
        const input = document.getElementById('mainInput');
        const query = name === 'Уборка' ? 'Товары для уборки' : `Рецепт: ${name}`;
        input.value = query;
        input.dispatchEvent(new Event('input'));

        await getAIResponse(name);
    }

    // Запрос к ИИ (Pollinations + DeepSeek)
    async function getAIResponse(topic) {
        const listContainer = document.getElementById('shoppingList');
        const emptyState = document.getElementById('emptyState');
        
        emptyState.innerHTML = `<div class="loader"></div> <p class="mt-2">ИИ подбирает товары...</p>`;
        
        const systemPrompt = `Ты — умный помощник для списка покупок. Когда пользователь называет блюдо или событие, возвращай JSON-объект, где ключи — категории магазина (на русском), а значения — массивы товаров. Только JSON. Пример: {"Овощи": ["Картофель", "Лук"], "Мясо": ["Говядина"]}`;
        
        try {
            const response = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: `Составь список покупок для: ${topic}` }
                    ],
                    model: 'deepseek'
                })
            });

            const text = await response.text();
            // Пытаемся извлечь JSON (ИИ иногда добавляет Markdown ```json)
            const jsonMatch = text.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
                const data = JSON.parse(jsonMatch[0]);
                updateList(data);
                saveToHistory(topic, data);
            }
        } catch (error) {
            console.error('Ошибка ИИ:', error);
            alert('Нет связи с ИИ. Попробуйте позже или проверьте интернет.');
            emptyState.innerHTML = `<p>Ошибка загрузки. Попробуйте еще раз.</p>`;
        }
    }

    // Получение рецепта
    async function getRecipe() {
        const dish = document.getElementById('mainInput').value.replace('Рецепт:', '').trim();
        const modal = document.getElementById('recipeModal');
        const content = document.getElementById('recipeContent');
        const title = document.getElementById('recipeTitle');

        title.innerText = dish;
        content.innerHTML = `<div class="text-center py-10"><div class="loader"></div><p>Ищу лучший рецепт в интернете...</p></div>`;
        modal.classList.add('active');

        try {
            const response = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: 'system', content: 'Ты шеф-повар. Напиши подробный рецепт блюда на русском языке до 500 слов. Используй теги <p> и <strong> для оформления.' },
                        { role: 'user', content: `Напиши рецепт: ${dish}` }
                    ],
                    model: 'deepseek'
                })
            });

            const recipeText = await response.text();
            content.innerHTML = recipeText.replace(/\n/g, '<br>');
        } catch (e) {
            content.innerHTML = "Не удалось загрузить рецепт. Проверьте интернет.";
        }
    }

    // Обновление UI списка
    function updateList(data) {
        const container = document.getElementById('shoppingList');
        container.innerHTML = '';
        
        for (const [category, items] of Object.entries(data)) {
            const catDiv = document.createElement('div');
            catDiv.innerHTML = `<div class="category-header">${category}</div>`;
            
            items.forEach(item => {
                const itemRow = document.createElement('div');
                itemRow.className = 'item-row';
                itemRow.innerHTML = `
                    <input type="checkbox" class="w-5 h-5 rounded-md border-slate-300 text-blue-600 focus:ring-blue-500" onchange="toggleItem(this)">
                    <span class="item-text ml-3 flex-grow text-slate-700">${item}</span>
                    <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 p-1">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;
                catDiv.appendChild(itemRow);
            });
            container.appendChild(catDiv);
        }
    }

    function toggleItem(checkbox) {
        const row = checkbox.parentElement;
        if (checkbox.checked) {
            row.classList.add('completed');
        } else {
            row.classList.remove('completed');
        }
    }

    function closeRecipe() {
        document.getElementById('recipeModal').classList.remove('active');
    }

    function clearList() {
        if(confirm('Очистить весь список?')) {
            document.getElementById('shoppingList').innerHTML = `
                <div id="emptyState" class="text-center py-20 text-slate-400">
                    <i class="fa-solid fa-basket-shopping text-5xl mb-4 opacity-20"></i>
                    <p>Список пока пуст</p>
                </div>`;
            document.getElementById('mainInput').value = '';
            document.getElementById('showRecipeBtn').classList.add('hidden');
        }
    }

    // Имитация голосового ввода
    function simulateVoice() {
        const mic = document.getElementById('micIcon');
        mic.classList.replace('fa-microphone', 'fa-ellipsis');
        mic.parentElement.classList.add('animate-pulse');
        
        setTimeout(() => {
            const val = prompt('Скажите что-нибудь (например: "Добавь всё для душа" или "Рецепт плова")');
            if (val) {
                document.getElementById('mainInput').value = val;
                handleQuickAction(val);
            }
            mic.classList.replace('fa-ellipsis', 'fa-microphone');
            mic.parentElement.classList.remove('animate-pulse');
        }, 800);
    }

    function shareList() {
        alert('Ссылка для синхронизации скопирована! Отправьте её родственнику. (Имитация 152-ФЗ)');
    }

    function toggleAddButton() {
        const name = prompt('Введите название новой кнопки:');
        if (name) {
            quickButtons.push(name);
            renderQuickButtons();
        }
    }

    // Работа с историей (localStorage)
    function saveToHistory(key, data) {
        const history = JSON.parse(localStorage.getItem('smartlist_history') || '{}');
        history[key.toLowerCase()] = {
            data: data,
            date: new Date().getTime()
        };
        localStorage.setItem('smartlist_history', JSON.stringify(history));
    }

    function loadFromHistory() {
        // Логика авто-очистки раз в неделю
        const history = JSON.parse(localStorage.getItem('smartlist_history') || '{}');
        const now = new Date().getTime();
        const oneWeek = 7 * 24 * 60 * 60 * 1000;

        for (const key in history) {
            if (now - history[key].date > oneWeek) {
                delete history[key];
            }
        }
        localStorage.setItem('smartlist_history', JSON.stringify(history));
    }
</script>

</body>
</html>
