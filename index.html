<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartList Pro — Работает всё!</title>
    
    <!-- Подключение стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e1b4b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Корпус телефона */
        .app-frame {
            width: 100%;
            max-width: 430px;
            height: 95vh;
            background: white;
            border: 8px solid #0f172a;
            border-radius: 45px;
            position: relative;
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Шапка */
        .app-header {
            background-color: #6366f1;
            padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: white;
        }

        .header-btns { display: flex; gap: 10px; }
        .circle-btn {
            width: 38px; height: 38px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex; items-center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }

        /* Поиск */
        .search-area { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .input-group {
            border: 2px solid #e2e8f0; border-radius: 14px;
            display: flex; items-center; padding: 0 12px; height: 52px; background: white;
        }
        .action-icon-btn {
            width: 46px; height: 46px; border-radius: 12px;
            display: flex; items-center; justify-content: center;
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }

        /* Слайдер */
        .slider-box { display: flex; overflow-x: auto; gap: 10px; padding: 10px 15px; background: white; }
        .slider-box::-webkit-scrollbar { display: none; }
        .chip {
            background: #f1f5f9; padding: 10px 18px; border-radius: 14px;
            display: flex; items-center; gap: 8px; font-size: 14px; font-weight: 600;
            white-space: nowrap; cursor: pointer; border: 1px solid #e2e8f0;
        }

        /* Список */
        .content-area { flex-grow: 1; overflow-y: auto; background: white; position: relative; }
        .empty-view { margin-top: 80px; text-align: center; color: #64748b; }
        .shopping-card { margin: 15px; border: 2px solid #f1f5f9; border-radius: 20px; overflow: hidden; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-head { background: #f8fafc; padding: 10px 15px; font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        .item-row { display: flex; items-center; padding: 14px 18px; border-bottom: 1px solid #f1f5f9; }
        .item-row.done { opacity: 0.4; text-decoration: line-through; background: #fcfcfc; }

        /* FAB */
        .fab-group { position: absolute; bottom: 30px; right: 25px; display: flex; flex-direction: column; gap: 12px; }
        .fab { width: 52px; height: 52px; border-radius: 50%; display: flex; items-center; justify-content: center; color: white; box-shadow: 0 8px 15px rgba(0,0,0,0.1); cursor: pointer; font-size: 20px; transition: 0.2s; }
        .fab:active { transform: scale(0.9); }

        /* Modal */
        #recipeModal {
            position: absolute; bottom: 0; left: 0; right: 0; background: white; height: 85%;
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); padding: 30px; display: flex; flex-direction: column;
        }
        #recipeModal.active { transform: translateY(0); }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-frame">
    <!-- Header -->
    <header class="app-header">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-cart-shopping text-2xl"></i>
            <span class="text-xl font-extrabold tracking-tight">SmartList Pro</span>
        </div>
        <div class="header-btns">
            <div onclick="clearAll()" class="circle-btn"><i class="fa-solid fa-trash-can"></i></div>
            <div onclick="shareList()" class="circle-btn"><i class="fa-solid fa-user-group"></i></div>
            <div onclick="alert('Статистика будет доступна в версии Premium')" class="circle-btn"><i class="fa-solid fa-chart-line"></i></div>
        </div>
    </header>

    <!-- Search Section -->
    <div class="search-area">
        <div class="flex gap-2">
            <div class="input-group flex-grow">
                <i class="fa-solid fa-magnifying-glass text-slate-400 mr-3"></i>
                <input type="text" id="mainInput" placeholder="Товар или «Рецепт: борщ»" class="w-full h-full outline-none text-sm font-medium">
            </div>
            <div onclick="simulateVoice()" class="action-icon-btn bg-amber-100 text-amber-500 border-amber-200 hover:bg-amber-200">
                <i class="fa-solid fa-microphone"></i>
            </div>
            <div onclick="getRecipe()" class="action-icon-btn bg-sky-100 text-sky-500 border-sky-200 hover:bg-sky-200">
                <i class="fa-solid fa-wand-sparkles"></i>
            </div>
            <div onclick="addItemManual()" class="action-icon-btn bg-indigo-600 text-white shadow-lg hover:bg-indigo-700">
                <i class="fa-solid fa-plus"></i>
            </div>
        </div>
    </div>

    <!-- Горизонтальный слайдер -->
    <div class="slider-box">
        <div onclick="quickAdd('Торт Наполеон')" class="chip"><i class="fa-solid fa-cake-candles"></i> Торт Наполеон</div>
        <div onclick="quickAdd('Борщ')" class="chip"><i class="fa-solid fa-bowl-food"></i> Борщ</div>
        <div onclick="quickAdd('Уборка')" class="chip"><i class="fa-solid fa-broom"></i> Уборка</div>
        <div onclick="quickAdd('Завтрак')" class="chip"><i class="fa-solid fa-egg"></i> Завтрак</div>
        <div class="circle-btn bg-indigo-500 text-white min-w-[38px]"><i class="fa-solid fa-play text-[12px]"></i></div>
    </div>

    <!-- Основной контент -->
    <div class="content-area">
        <div id="emptyView" class="empty-view">
            <i class="fa-solid fa-cart-arrow-down text-7xl opacity-10 mb-6 block"></i>
            <p class="text-lg font-bold text-slate-800">Список пуст</p>
            <p class="text-sm text-slate-400 mt-2 px-10">Введите товар или выберите шаблон выше</p>
        </div>
        <div id="shoppingList"></div>
    </div>

    <!-- FABs -->
    <div class="fab-group">
        <div class="fab bg-indigo-400" onclick="alert('Настройки темы доступны в Premium')"><i class="fa-solid fa-gear"></i></div>
        <div class="fab bg-indigo-500" onclick="alert('Поддержка: jet2026@support.ai')"><i class="fa-solid fa-question"></i></div>
    </div>

    <!-- Рецепт -->
    <div id="recipeModal">
        <div class="flex justify-between items-center mb-6">
            <h2 id="recipeTitle" class="text-2xl font-black text-slate-900">Рецепт</h2>
            <div onclick="closeRecipe()" class="cursor-pointer text-2xl p-2 font-bold text-slate-400 hover:text-slate-950">✕</div>
        </div>
        <div id="recipeBody" class="overflow-y-auto pr-2 text-slate-600 leading-relaxed text-lg"></div>
    </div>
</div>

<script>
    // --- КОНФИГУРАЦИЯ ---
    const supabaseUrl = 'https://frawcmyjmkzntakwjiov.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyYXdjbXlqbWt6bnRha3dqaW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODEyNDMsImV4cCI6MjA5MzQ1NzI0M30.qcp517sZD4LoyxZQ7J-seuG-HuTNqIkAtYi2RSp8ytA';
    
    let supabase;
    try {
        // Инициализируем БД только если библиотека загружена
        if (window.supabase) {
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        }
    } catch(e) { console.error("Database connection error"); }

    const urlParams = new URLSearchParams(window.location.search);
    let shareId = urlParams.get('list');

    // Авто-загрузка
    window.addEventListener('load', () => {
        if(shareId) loadCloud();
    });

    // --- ОСНОВНЫЕ ФУНКЦИИ (ГЛОБАЛЬНЫЕ) ---

    async function quickAdd(name) {
        document.getElementById('mainInput').value = `Рецепт: ${name}`;
        await getAIItems(name);
    }

    async function addItemManual() {
        const input = document.getElementById('mainInput');
        const val = input.value.trim();
        if(!val) return;
        
        if(val.toLowerCase().includes('рецепт')) {
            await getAIItems(val.replace('Рецепт:', '').trim());
        } else {
            renderSingle(val, "Разное");
        }
        input.value = '';
    }

    async function getAIItems(topic) {
        const empty = document.getElementById('emptyView');
        const listContainer = document.getElementById('shoppingList');
        
        empty.style.display = 'none';
        listContainer.innerHTML = `<div class="p-10 text-center"><div class="loader mx-auto"></div><p class="mt-4 text-indigo-600 font-bold uppercase text-[10px] tracking-widest">ИИ формирует список...</p></div>`;

        try {
            const prompt = `Составь список покупок для темы "${topic}". Верни ТОЛЬКО JSON: {"Категория": ["Товар1", "Товар2"]}`;
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&json=true`);
            const data = await res.json();
            
            renderAll(data);
            saveCloud(data);
        } catch (e) {
            console.error(e);
            alert("Ошибка ИИ. Проверьте интернет.");
            empty.style.display = 'block';
            listContainer.innerHTML = '';
        }
    }

    function renderAll(data) {
        const listContainer = document.getElementById('shoppingList');
        listContainer.innerHTML = '';
        document.getElementById('emptyView').style.display = 'none';

        for (const [cat, items] of Object.entries(data)) {
            const card = document.createElement('div');
            card.className = 'shopping-card';
            card.innerHTML = `<div class="card-head">${cat}</div>`;
            
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <input type="checkbox" class="w-6 h-6 rounded-lg border-slate-300" onchange="this.parentElement.classList.toggle('done')">
                    <span class="ml-4 flex-grow font-semibold text-slate-700 text-sm">${item}</span>
                    <i class="fa-solid fa-trash-can text-slate-200 cursor-pointer p-2 hover:text-red-500" onclick="this.parentElement.remove(); checkEmpty();"></i>
                `;
                card.appendChild(row);
            });
            listContainer.appendChild(card);
        }
    }

    function renderSingle(name, cat) {
        document.getElementById('emptyView').style.display = 'none';
        const listContainer = document.getElementById('shoppingList');
        
        // Ищем существующую карточку "Разное" или создаем новую
        let card = document.querySelector('.shopping-card');
        if (!card) {
            card = document.createElement('div');
            card.className = 'shopping-card';
            card.innerHTML = `<div class="card-head">${cat}</div>`;
            listContainer.appendChild(card);
        }

        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <input type="checkbox" class="w-6 h-6 rounded-lg border-slate-300" onchange="this.parentElement.classList.toggle('done')">
            <span class="ml-4 flex-grow font-semibold text-slate-700 text-sm">${name}</span>
            <i class="fa-solid fa-trash-can text-slate-200 cursor-pointer p-2" onclick="this.parentElement.remove(); checkEmpty();"></i>
        `;
        card.appendChild(row);
    }

    async function getRecipe() {
        const input = document.getElementById('mainInput');
        const dish = input.value.replace('Рецепт:', '').trim();
        if(!dish) {
            alert("Введите название блюда (например: Борщ)");
            return;
        }

        const modal = document.getElementById('recipeModal');
        const body = document.getElementById('recipeBody');
        document.getElementById('recipeTitle').innerText = dish;
        body.innerHTML = `<div class="py-10 text-center"><div class="loader mx-auto"></div><p class="mt-4 font-bold text-slate-400">Шеф-повар пишет рецепт...</p></div>`;
        modal.classList.add('active');

        try {
            const prompt = `Напиши пошаговый рецепт блюда "${dish}" на русском. Используй <strong> для заголовков и <p> для шагов. Начни сразу с текста.`;
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai`);
            const text = await res.text();
            body.innerHTML = text;
        } catch (e) {
            body.innerHTML = "Ошибка получения рецепта. Попробуйте позже.";
        }
    }

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---

    function checkEmpty() {
        const list = document.getElementById('shoppingList');
        if (list.children.length === 0 || (list.children.length === 1 && list.firstChild.children.length <= 1)) {
            document.getElementById('emptyView').style.display = 'block';
            list.innerHTML = '';
        }
    }

    async function saveCloud(data) {
        if(!supabase) return;
        if(!shareId) {
            shareId = 'list_' + Math.random().toString(36).substr(2, 9);
            window.history.pushState({}, '', '?list=' + shareId);
        }
        await supabase.from('shopping_lists').upsert([{ share_id: shareId, items: data }], { onConflict: 'share_id' });
    }

    async function loadCloud() {
        const { data } = await supabase.from('shopping_lists').select('items').eq('share_id', shareId).single();
        if(data) renderAll(data.items);
    }

    function clearAll() {
        if(confirm('Сбросить весь список покупок?')) {
            window.location.href = window.location.pathname;
        }
    }

    function closeRecipe() {
        document.getElementById('recipeModal').classList.remove('active');
    }

    function simulateVoice() {
        const v = prompt('Голосовой ввод (пример: "Добавь молоко" или "Рецепт пиццы"):');
        if(v) {
            document.getElementById('mainInput').value = v;
            addItemManual();
        }
    }

    function shareList() {
        const url = window.location.href;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(() => alert('Ссылка скопирована! Отправьте её родным.'));
        } else {
            alert('Ваш URL: ' + url);
        }
    }
</script>

</body>
</html>
