<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartList Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; overflow: hidden; }
        .app-container { max-width: 450px; margin: 0 auto; background: white; height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.2); }
        
        /* Header */
        .header { background: #6366f1; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .header-btn { background: rgba(255,255,255,0.2); width: 38px; height: 38px; border-radius: 50%; display: flex; items-center; justify-content: center; cursor: pointer; }

        /* Search Area */
        .search-section { padding: 15px; border-bottom: 1px solid #e5e7eb; }
        .input-wrapper { border: 1px solid #d1d5db; border-radius: 12px; display: flex; align-items: center; padding: 0 12px; background: white; }
        .action-btn { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        
        /* Slider */
        .slider-container { display: flex; overflow-x: auto; gap: 10px; padding: 10px 15px; scrollbar-width: none; background: white; }
        .slider-container::-webkit-scrollbar { display: none; }
        .quick-item { background: #f3f4f6; padding: 8px 16px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; white-space: nowrap; cursor: pointer; }

        /* Main Area */
        .main-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; background: white; }
        .empty-state { margin: auto; text-align: center; color: #4b5563; }
        .shopping-card { margin: 12px; border: 1px solid #e5e7eb; border-radius: 16px; background: white; overflow: hidden; }
        .category-header { background: #f9fafb; padding: 10px 15px; font-weight: 700; font-size: 12px; color: #6b7280; text-transform: uppercase; border-bottom: 1px solid #e5e7eb; }
        .item-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f3f4f6; }
        .item-row.checked { opacity: 0.5; text-decoration: line-through; }

        /* FABs */
        .fab-container { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .fab { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; }

        /* Recipe Modal */
        #recipeModal { position: absolute; inset: 0; background: white; z-index: 50; display: none; flex-direction: column; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span class="text-lg font-bold">SmartList Pro</span>
        </div>
        <div class="flex gap-2">
            <div onclick="clearList()" class="header-btn"><i class="fa-solid fa-trash-can text-sm"></i></div>
            <div onclick="shareList()" class="header-btn"><i class="fa-solid fa-user-group text-sm"></i></div>
            <div class="header-btn"><i class="fa-solid fa-chart-simple text-sm"></i></div>
        </div>
    </div>

    <!-- Search Section -->
    <div class="search-section space-y-3">
        <div class="flex gap-2">
            <div class="input-wrapper flex-grow">
                <i class="fa-solid fa-magnifying-glass text-slate-400 mr-2"></i>
                <input type="text" id="mainInput" placeholder="Товар или «Рецепт: борщ»" class="w-full py-3 outline-none text-sm">
            </div>
            <div onclick="simulateVoice()" class="action-btn bg-amber-100 text-amber-600"><i class="fa-solid fa-microphone"></i></div>
            <div onclick="getRecipe()" class="action-btn bg-sky-100 text-sky-600"><i class="fa-solid fa-sparkles"></i></div>
            <div onclick="manualAdd()" class="action-btn bg-indigo-600 text-white"><i class="fa-solid fa-plus"></i></div>
        </div>
    </div>

    <!-- Quick Slider -->
    <div class="slider-container">
        <div onclick="quickAction('Торт Наполеон')" class="quick-item"><i class="fa-solid fa-utensils"></i> Торт Наполеон</div>
        <div onclick="quickAction('Борщ')" class="quick-item"><i class="fa-solid fa-bowl-food"></i> Борщ</div>
        <div onclick="quickAction('Уборка')" class="quick-item"><i class="fa-solid fa-broom"></i> Уборка</div>
        <div onclick="quickAction('Завтрак')" class="quick-item"><i class="fa-solid fa-egg"></i> Завтрак</div>
        <div class="action-btn bg-indigo-500 text-white rounded-full min-w-[44px]"><i class="fa-solid fa-play"></i></div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="main-content">
        <div id="emptyState" class="empty-state">
            <div class="text-6xl mb-4 opacity-20"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="text-lg font-bold">Список пуст</div>
            <div class="text-sm text-slate-400">Введите товар или выберите шаблон</div>
        </div>
        <div id="listItems"></div>
    </div>

    <!-- FABs -->
    <div class="fab-container">
        <div class="fab bg-indigo-400" onclick="alert('Настройки')"><i class="fa-solid fa-gear"></i></div>
        <div class="fab bg-indigo-500" onclick="alert('Помощь')"><i class="fa-solid fa-question"></i></div>
    </div>

    <!-- Recipe Modal -->
    <div id="recipeModal">
        <div class="p-4 border-b flex justify-between items-center">
            <h2 id="recipeTitle" class="font-bold text-lg">Рецепт</h2>
            <div onclick="closeRecipe()" class="cursor-pointer text-xl p-2">✕</div>
        </div>
        <div id="recipeContent" class="p-6 overflow-y-auto leading-relaxed text-slate-600"></div>
    </div>
</div>

<script>
    // Настройки базы
    const supabaseUrl = 'https://frawcmyjmkzntakwjiov.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyYXdjbXlqbWt6bnRha3dqaW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODEyNDMsImV4cCI6MjA5MzQ1NzI0M30.qcp517sZD4LoyxZQ7J-seuG-HuTNqIkAtYi2RSp8ytA';
    let supabase;
    
    try {
        supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    } catch(e) { console.log("DB Error"); }

    let currentShareId = new URLSearchParams(window.location.search).get('list');

    window.onload = () => {
        if(currentShareId) loadFromCloud();
    };

    // --- ФУНКЦИИ ИНТЕРФЕЙСА ---

    async function quickAction(name) {
        document.getElementById('mainInput').value = `Рецепт: ${name}`;
        await getAIItems(name);
    }

    async function manualAdd() {
        const val = document.getElementById('mainInput').value;
        if(!val) return;
        if(val.toLowerCase().includes('рецепт')) {
            await getAIItems(val.replace('Рецепт:', ''));
        } else {
            addSingleItem(val, "Разное");
        }
        document.getElementById('mainInput').value = '';
    }

    async function getAIItems(topic) {
        const empty = document.getElementById('emptyState');
        const listDiv = document.getElementById('listItems');
        empty.style.display = 'none';
        listDiv.innerHTML = `<div class="p-10 text-center"><div class="loader"></div><p class="mt-2 text-sm text-indigo-600">ИИ подбирает товары...</p></div>`;

        try {
            const prompt = `Верни ТОЛЬКО JSON: {"Категория": ["Товар1", "Товар2"]} для темы: ${topic}`;
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&json=true`);
            const data = await res.json();
            renderUI(data);
            saveToCloud(data);
        } catch (e) {
            alert("Ошибка ИИ. Проверьте интернет.");
            empty.style.display = 'block';
            listDiv.innerHTML = '';
        }
    }

    function renderUI(data) {
        const listDiv = document.getElementById('listItems');
        listDiv.innerHTML = '';
        document.getElementById('emptyState').style.display = 'none';

        for (const [cat, items] of Object.entries(data)) {
            const card = document.createElement('div');
            card.className = 'shopping-card';
            card.innerHTML = `<div class="category-header">${cat}</div>`;
            
            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <input type="checkbox" class="w-5 h-5 rounded border-slate-300" onchange="this.parentElement.classList.toggle('checked')">
                    <span class="ml-3 flex-grow text-sm font-medium">${item}</span>
                    <i class="fa-solid fa-trash-can text-slate-300 cursor-pointer p-1" onclick="this.parentElement.remove()"></i>
                `;
                card.appendChild(row);
            });
            listDiv.appendChild(card);
        }
    }

    async function getRecipe() {
        const val = document.getElementById('mainInput').value;
        const dish = val.replace('Рецепт:', '').trim();
        if(!dish) return alert("Введите название блюда");

        const modal = document.getElementById('recipeModal');
        const content = document.getElementById('recipeContent');
        document.getElementById('recipeTitle').innerText = dish;
        content.innerHTML = `<div class="text-center py-10"><div class="loader"></div><p>Шеф-повар пишет рецепт...</p></div>`;
        modal.style.display = 'flex';

        try {
            const res = await fetch(`https://text.pollinations.ai/Напиши подробный рецепт ${dish} на русском. Используй <p> и <strong>?model=openai`);
            content.innerHTML = await res.text();
        } catch (e) { content.innerHTML = "Ошибка загрузки рецепта."; }
    }

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---

    function addSingleItem(name, cat) {
        const listDiv = document.getElementById('listItems');
        document.getElementById('emptyState').style.display = 'none';
        const card = document.createElement('div');
        card.className = 'shopping-card';
        card.innerHTML = `<div class="category-header">${cat}</div>
            <div class="item-row">
                <input type="checkbox" class="w-5 h-5 rounded border-slate-300" onchange="this.parentElement.classList.toggle('checked')">
                <span class="ml-3 flex-grow text-sm font-medium">${name}</span>
                <i class="fa-solid fa-trash-can text-slate-300 cursor-pointer" onclick="this.parentElement.parentElement.remove()"></i>
            </div>`;
        listDiv.appendChild(card);
    }

    async function saveToCloud(data) {
        if(!supabase) return;
        if(!currentShareId) {
            currentShareId = 'list_' + Math.random().toString(36).substr(2, 9);
            window.history.pushState({}, '', '?list=' + currentShareId);
        }
        await supabase.from('shopping_lists').upsert([{ share_id: currentShareId, items: data }], { onConflict: 'share_id' });
    }

    async function loadFromCloud() {
        const { data } = await supabase.from('shopping_lists').select('items').eq('share_id', currentShareId).single();
        if(data) renderUI(data.items);
    }

    function clearList() { if(confirm('Очистить список?')) location.href = window.location.pathname; }
    function closeRecipe() { document.getElementById('recipeModal').style.display = 'none'; }
    function simulateVoice() { const v = prompt('Ваш запрос:'); if(v) { document.getElementById('mainInput').value = v; manualAdd(); } }
    function shareList() { navigator.clipboard.writeText(window.location.href); alert('Ссылка скопирована!'); }
</script>

</body>
</html>
