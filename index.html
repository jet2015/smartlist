<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartList — Умный помощник</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #0f172a;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-container {
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Премиальные обводки и поля */
        .app-border {
            border: 2px solid #e2e8f0;
        }

        .input-group {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-group:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .category-card {
            margin: 16px;
            border: 2px solid #f1f5f9;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .category-header {
            background: #f8fafc;
            padding: 12px 20px;
            font-weight: 800;
            font-size: 0.75rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-row {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #f1f5f9;
        }
        .item-row:last-child { border-bottom: none; }
        .item-row.completed { background: #f8fafc; opacity: 0.6; }
        .item-row.completed .item-text { text-decoration: line-through; color: #94a3b8; }

        .quick-btn {
            white-space: nowrap;
            padding: 10px 20px;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            color: #334155;
            transition: all 0.2s ease;
        }
        .quick-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        #recipeModal {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            z-index: 100;
        }
        #recipeModal.active { transform: translateY(0); }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="mobile-container">
    <!-- Header -->
    <header class="p-6 border-b-2 border-slate-50 flex justify-between items-center bg-white sticky top-0 z-10">
        <div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tighter">SmartList</h1>
            <div class="flex items-center gap-2 mt-0.5">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">AI Assistant 2026</p>
            </div>
        </div>
        <button onclick="shareList()" class="w-11 h-11 rounded-2xl border-2 border-slate-100 flex items-center justify-center text-blue-600 hover:bg-blue-50 transition-all active:scale-90">
            <i class="fa-solid fa-share-nodes"></i>
        </button>
    </header>

    <!-- Search & Buttons -->
    <div class="p-4 space-y-4">
        <div class="flex items-center gap-2">
            <div class="relative flex-grow input-group">
                <input type="text" id="mainInput" 
                    placeholder="Назовите блюдо..." 
                    class="w-full bg-transparent border-none py-4 pl-12 pr-4 font-semibold outline-none text-slate-700">
                <i class="fa-solid fa-wand-magic-sparkles absolute left-4 top-4.5 text-blue-500"></i>
            </div>
            <button id="showRecipeBtn" onclick="getRecipe()" 
                class="hidden bg-blue-600 text-white px-6 py-4 rounded-2xl font-extrabold shadow-lg active:scale-95 transition-all">
                РЕЦЕПТ
            </button>
        </div>

        <div class="overflow-x-auto no-scrollbar">
            <div id="quickButtons" class="flex gap-2 pb-2">
                <!-- JS кнопки -->
            </div>
        </div>
    </div>

    <!-- Trial Banner -->
    <div class="mx-4 p-4 bg-slate-900 rounded-[24px] flex justify-between items-center text-white shadow-xl shadow-slate-200 border-2 border-slate-800">
        <div>
            <p class="font-black text-sm uppercase tracking-wide">Free Trial</p>
            <p class="text-slate-400 text-[11px] font-bold">7 дней полного доступа</p>
        </div>
        <button class="bg-blue-600 px-4 py-2 rounded-xl font-black text-[11px] uppercase tracking-tighter shadow-lg shadow-blue-900/20 active:scale-95 transition-all">
            Активировать
        </button>
    </div>

    <!-- List Content -->
    <div id="shoppingList" class="flex-grow pb-32">
        <div id="emptyState" class="text-center py-24 px-10">
            <div class="w-24 h-24 bg-slate-50 rounded-[32px] flex items-center justify-center mx-auto mb-6 border-2 border-dashed border-slate-200">
                <i class="fa-solid fa-basket-shopping text-3xl text-slate-200"></i>
            </div>
            <p class="font-black text-slate-800 text-lg">Список пуст</p>
            <p class="text-sm text-slate-400 mt-2 font-medium">Нажмите на кнопку блюда выше, чтобы ИИ составил список покупок</p>
        </div>
    </div>

    <!-- Navigation -->
    <div class="fixed bottom-0 max-w-[480px] w-full bg-white/90 backdrop-blur-xl border-t-2 border-slate-50 p-6 flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <button onclick="clearList()" class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-red-500 transition-all">
            <div class="w-12 h-12 rounded-2xl border-2 border-slate-100 flex items-center justify-center">
                <i class="fa-solid fa-eraser text-lg"></i>
            </div>
            <span class="text-[9px] font-black uppercase tracking-widest">Сброс</span>
        </button>
        
        <button onclick="simulateVoice()" class="bg-blue-600 w-16 h-16 rounded-[24px] flex items-center justify-center text-white shadow-2xl shadow-blue-400 active:scale-90 transition-all -mt-14 border-4 border-white">
            <i id="micIcon" class="fa-solid fa-microphone text-2xl"></i>
        </button>

        <button onclick="addNewQuickBtn()" class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-blue-600 transition-all">
            <div class="w-12 h-12 rounded-2xl border-2 border-slate-100 flex items-center justify-center">
                <i class="fa-solid fa-plus text-lg"></i>
            </div>
            <span class="text-[9px] font-black uppercase tracking-widest">Кнопка</span>
        </button>
    </div>

    <!-- Recipe Window -->
    <div id="recipeModal" class="fixed inset-x-0 bottom-0 max-w-[480px] mx-auto bg-white rounded-t-[48px] shadow-2xl h-[85vh] flex flex-col border-t-2 border-slate-100">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-4 mb-2"></div>
        <div class="p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 id="recipeTitle" class="text-3xl font-black text-slate-900 leading-none">Рецепт</h2>
                <button onclick="closeRecipe()" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 text-xl font-bold">✕</button>
            </div>
            <div id="recipeContent" class="text-slate-600 text-lg leading-relaxed space-y-6 font-medium"></div>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://frawcmyjmkzntakwjiov.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyYXdjbXlqbWt6bnRha3dqaW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODEyNDMsImV4cCI6MjA5MzQ1NzI0M30.qcp517sZD4LoyxZQ7J-seuG-HuTNqIkAtYi2RSp8ytA';
    
    let supabase;
    try { supabase = window.supabase.createClient(supabaseUrl, supabaseKey); } catch(e) {}

    let quickButtons = ['Борщ', 'Плов', 'Шашлык', 'Оливье', 'Завтрак', 'Уборка'];
    let currentShareId = new URLSearchParams(window.location.search).get('list');

    document.addEventListener('DOMContentLoaded', () => {
        renderButtons();
        if (currentShareId && supabase) loadListFromCloud(currentShareId);
        
        document.getElementById('mainInput').addEventListener('input', (e) => {
            document.getElementById('showRecipeBtn').classList.toggle('hidden', !e.target.value.toLowerCase().includes('рецепт'));
        });
    });

    function renderButtons() {
        document.getElementById('quickButtons').innerHTML = quickButtons.map(name => `
            <button onclick="handleQuickAction('${name}')" class="quick-btn">${name}</button>
        `).join('');
    }

    async function handleQuickAction(topic) {
        document.getElementById('mainInput').value = topic === 'Уборка' ? 'Уборка' : `Рецепт: ${topic}`;
        document.getElementById('mainInput').dispatchEvent(new Event('input'));
        await getAIResponse(topic);
    }

    // --- МОДЕЛЬ ИСПРАВЛЕНА НА OPENAI (ЧЕРЕЗ POLLINATIONS) ---
    async function getAIResponse(topic) {
        const emptyState = document.getElementById('emptyState');
        emptyState.innerHTML = `<div class="flex flex-col items-center py-12"><div class="loader mb-4"></div><p class="font-extrabold text-blue-600 animate-pulse text-sm uppercase tracking-widest">Smart AI обрабатывает запрос...</p></div>`;
        
        const prompt = `Составь список покупок для "${topic}". Верни ТОЛЬКО JSON объект на русском языке: {"Категория": ["Товар1", "Товар2"]}. Никакого текста до или после JSON.`;
        
        try {
            // Используем модель openai как самую стабильную у посредника сейчас
            const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&json=true&seed=${Math.floor(Math.random()*1000)}`);
            const rawText = await response.text();
            
            // Чистим текст от возможной разметки markdown (```json ... ```)
            const cleanedJson = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
            const data = JSON.parse(cleanedJson);
            
            updateUI(data);
            saveToCloud(data);
        } catch (error) {
            console.error('AI Error:', error);
            alert("Нет связи с ИИ. Попробуйте еще раз через 5 секунд.");
            location.reload();
        }
    }

    function updateUI(data) {
        const container = document.getElementById('shoppingList');
        container.innerHTML = '';
        
        for (const [category, items] of Object.entries(data)) {
            const card = document.createElement('div');
            card.className = 'category-card';
            
            let itemsHtml = items.map(item => `
                <div class="item-row">
                    <input type="checkbox" class="w-6 h-6 rounded-lg border-2 border-slate-200 text-blue-600 focus:ring-0" onchange="this.parentElement.classList.toggle('completed')">
                    <span class="item-text ml-4 flex-grow font-bold text-slate-700 text-sm">${item}</span>
                    <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-400 p-2 text-xs">✕</button>
                </div>
            `).join('');

            card.innerHTML = `<div class="category-header"><i class="fa-solid fa-tag text-blue-400 mr-2"></i>${category}</div>${itemsHtml}`;
            container.appendChild(card);
        }
    }

    async function getRecipe() {
        const dish = document.getElementById('mainInput').value.replace('Рецепт:', '').trim();
        const content = document.getElementById('recipeContent');
        document.getElementById('recipeTitle').innerText = dish;
        content.innerHTML = `<div class="flex flex-col items-center py-24"><div class="loader mb-4"></div><p class="font-black text-blue-500 uppercase text-xs tracking-widest">Ищем рецепт...</p></div>`;
        document.getElementById('recipeModal').classList.add('active');

        try {
            const prompt = `Напиши пошаговый рецепт блюда: ${dish}. На русском языке. Используй HTML теги <p> и <strong>. Начни сразу с текста рецепта.`;
            const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai`);
            content.innerHTML = await response.text();
        } catch (e) {
            content.innerHTML = "Ошибка получения рецепта.";
        }
    }

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---
    async function saveToCloud(data) {
        if (!supabase) return;
        if (!currentShareId) {
            currentShareId = 'list_' + Math.random().toString(36).substr(2, 9);
            window.history.pushState({}, '', window.location.origin + window.location.pathname + '?list=' + currentShareId);
        }
        await supabase.from('shopping_lists').upsert([{ share_id: currentShareId, items: data }], { onConflict: 'share_id' });
    }

    async function loadListFromCloud(id) {
        const { data } = await supabase.from('shopping_lists').select('items').eq('share_id', id).single();
        if (data) updateUI(data.items);
    }

    function closeRecipe() { document.getElementById('recipeModal').classList.remove('active'); }
    function clearList() { if(confirm('Удалить всё?')) location.href = window.location.pathname; }
    function simulateVoice() { const v = prompt('Что вы хотите?'); if(v) handleQuickAction(v); }
    function addNewQuickBtn() { const n = prompt('Название:'); if(n) { quickButtons.push(n); renderButtons(); } }
    function shareList() { navigator.clipboard.writeText(window.location.href); alert('Ссылка скопирована!'); }
</script>

</body>
</html>
