<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartList Pro — DeepSeek V3.1</title>
    
    <!-- Подключение Tailwind, Supabase и иконок -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e1b4b; /* Темный фон вокруг "телефона" */
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* КОРПУС ТЕЛЕФОНА */
        .phone-frame {
            width: 100%; max-width: 430px; height: 96vh;
            background: #ffffff;
            border: 8px solid #0f172a;
            border-radius: 45px;
            position: relative; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        /* 1. ШАПКА */
        .top-header {
            background-color: #6366f1; /* Индиго */
            padding: 20px 20px 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: white;
        }

        .header-buttons { display: flex; gap: 10px; }
        .circle-icon-btn {
            width: 36px; height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s, background 0.2s;
        }
        .circle-icon-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.3); }

        /* 2. ПОИСК И ОБВОДКИ */
        .search-area { padding: 16px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 8px; }
        
        .main-input-wrap {
            border: 2px solid #e2e8f0; border-radius: 14px;
            display: flex; align-items: center; padding: 0 14px;
            height: 48px; background: white; flex-grow: 1;
        }
        
        .main-input-wrap input { width: 100%; outline: none; font-size: 14px; font-weight: 600; color: #334155; }
        
        .action-box-btn {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s; border: 2px solid transparent; font-size: 18px;
        }
        .action-box-btn:active { transform: scale(0.92); }

        /* 3. СЛАЙДЕР ШАБЛОНОВ (Вшиты в HTML для надежности) */
        .scroll-chips {
            display: flex; overflow-x: auto; gap: 10px; padding: 12px 16px;
            background: white; scrollbar-width: none;
        }
        .scroll-chips::-webkit-scrollbar { display: none; }
        
        .template-chip {
            background: #f8fafc; padding: 10px 16px; border-radius: 12px;
            display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700;
            color: #334155; white-space: nowrap; cursor: pointer; border: 2px solid #e2e8f0;
        }
        .template-chip:active { background: #e2e8f0; }

        /* 4. СПИСОК ТОВАРОВ */
        .list-area { flex-grow: 1; overflow-y: auto; background: #ffffff; position: relative; padding-bottom: 80px; }
        
        .empty-view { margin-top: 80px; text-align: center; color: #94a3b8; }
        .empty-view i { font-size: 80px; opacity: 0.1; margin-bottom: 20px; }
        
        .category-card { margin: 16px; border: 2px solid #f1f5f9; border-radius: 20px; overflow: hidden; background: white; }
        .category-title { background: #f8fafc; padding: 10px 16px; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        .item-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
        .item-row:last-child { border-bottom: none; }
        .item-row.purchased { opacity: 0.4; text-decoration: line-through; background: #fcfcfc; }

        /* 5. ПЛАВАЮЩИЕ КНОПКИ (FAB) */
        .fab-container { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; }
        .fab-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.15); font-size: 20px; }

        /* 6. МОДАЛЬНОЕ ОКНО РЕЦЕПТА */
        .recipe-modal {
            position: absolute; bottom: 0; left: 0; right: 0; background: white; height: 85%;
            border-top-left-radius: 40px; border-top-right-radius: 40px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; box-shadow: 0 -20px 50px rgba(0,0,0,0.3); padding: 30px; display: flex; flex-direction: column;
        }
        .recipe-modal.open { transform: translateY(0); }

        /* АНИМАЦИЯ */
        .loader {
            border: 3px solid #f1f5f9; border-top: 3px solid #6366f1; border-radius: 50%;
            width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="phone-frame">
    <!-- Шапка (полное соответствие дизайну) -->
    <header class="top-header">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-cart-shopping text-2xl"></i>
            <span class="text-xl font-black tracking-tight">SmartList Pro</span>
        </div>
        <div class="header-buttons">
            <div onclick="clearEntireList()" class="circle-icon-btn" title="Очистить"><i class="fa-solid fa-trash-can"></i></div>
            <div onclick="shareListToFamily()" class="circle-icon-btn" title="Поделиться"><i class="fa-solid fa-user-group"></i></div>
            <div onclick="alert('Статистика расходов появится в версии Premium')" class="circle-icon-btn" title="Статистика"><i class="fa-solid fa-chart-line"></i></div>
        </div>
    </header>

    <!-- Поиск (обводки и кнопки) -->
    <div class="search-area">
        <div class="main-input-wrap">
            <i class="fa-solid fa-magnifying-glass text-slate-400 mr-2"></i>
            <input type="text" id="mainInput" placeholder="Товар или «Рецепт: борщ»">
        </div>
        <!-- Микрофон -->
        <div onclick="handleVoice()" class="action-box-btn bg-amber-100 text-amber-500 border-amber-200"><i class="fa-solid fa-microphone"></i></div>
        <!-- Искры (Рецепт) -->
        <div onclick="loadRecipeFromAI()" class="action-box-btn bg-sky-100 text-sky-500 border-sky-200"><i class="fa-solid fa-wand-sparkles"></i></div>
        <!-- Плюс -->
        <div onclick="handleManualAdd()" class="action-box-btn bg-indigo-600 text-white shadow-lg shadow-indigo-200"><i class="fa-solid fa-plus"></i></div>
    </div>

    <!-- Слайдер шаблонов (Все кнопки вшиты жестко, чтобы никогда не пропадали) -->
    <div class="scroll-chips">
        <div class="template-chip" onclick="handleQuickClick('Торт Наполеон')"><i class="fa-solid fa-cake-candles"></i> Торт Наполеон</div>
        <div class="template-chip" onclick="handleQuickClick('Борщ')"><i class="fa-solid fa-bowl-food"></i> Борщ</div>
        <div class="template-chip" onclick="handleQuickClick('Уборка')"><i class="fa-solid fa-broom"></i> Уборка</div>
        <div class="template-chip" onclick="handleQuickClick('Завтрак')"><i class="fa-solid fa-egg"></i> Завтрак</div>
        <div class="template-chip bg-indigo-50 text-indigo-600 border-indigo-200" onclick="addNewTemplate()"><i class="fa-solid fa-plus"></i> Шаблон</div>
    </div>

    <!-- Список товаров -->
    <div class="list-area">
        <div id="emptyState" class="empty-view">
            <i class="fa-solid fa-cart-arrow-down"></i>
            <p class="text-xl font-black text-slate-800">Список пуст</p>
            <p class="text-sm font-semibold mt-2 text-slate-400">Введите товар или выберите шаблон выше</p>
        </div>
        <div id="shoppingList"></div>
    </div>

    <!-- Плавающие кнопки -->
    <div class="fab-container">
        <div class="fab-btn bg-indigo-400" onclick="alert('Настройки темы (Premium)')"><i class="fa-solid fa-gear"></i></div>
        <div class="fab-btn bg-indigo-500" onclick="alert('Помощь и обратная связь')"><i class="fa-solid fa-question"></i></div>
    </div>

    <!-- Окно рецепта -->
    <div id="recipeModal" class="recipe-modal">
        <div class="flex justify-between items-center mb-6">
            <h2 id="recipeTitle" class="text-2xl font-black text-slate-900 leading-tight">Рецепт</h2>
            <div onclick="document.getElementById('recipeModal').classList.remove('open')" class="cursor-pointer text-2xl px-2 text-slate-400 hover:text-slate-900">✕</div>
        </div>
        <div id="recipeContent" class="overflow-y-auto pr-2 text-slate-600 leading-relaxed text-lg font-medium"></div>
    </div>
</div>

<!-- ========================================== -->
<!-- НАДЕЖНАЯ ЛОГИКА ПРИЛОЖЕНИЯ                 -->
<!-- ========================================== -->
<script>
    // 1. КОНФИГУРАЦИЯ
    const SUPABASE_URL = 'https://frawcmyjmkzntakwjiov.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyYXdjbXlqbWt6bnRha3dqaW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODEyNDMsImV4cCI6MjA5MzQ1NzI0M30.qcp517sZD4LoyxZQ7J-seuG-HuTNqIkAtYi2RSp8ytA';
    
    let supabase = null;
    let currentShareId = new URLSearchParams(window.location.search).get('list');
    let appData = {}; // Все товары будут храниться здесь

    // 2. ИНИЦИАЛИЗАЦИЯ (Без зависаний)
    window.onload = async () => {
        // Подключаем БД, игнорируем ошибку если интернет слабый
        try { if (window.supabase) supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } 
        catch (e) { console.warn("Supabase init failed"); }
        
        // Пытаемся загрузить из облака или истории
        try {
            if (currentShareId && supabase) {
                await loadFromCloud();
            } else {
                loadFromHistory();
            }
        } catch(e) {
            console.warn("Load data failed", e);
            loadFromHistory(); // Запасной план
        }
        
        // Рисуем список в любом случае
        renderList();
    };

    // 3. ФУНКЦИИ ИНТЕРФЕЙСА (Кнопки быстрого доступа)
    async function handleQuickClick(name) {
        document.getElementById('mainInput').value = `Рецепт: ${name}`;
        await fetchListFromAI(name);
    }

    // Ручное добавление (+)
    async function handleManualAdd() {
        const input = document.getElementById('mainInput');
        const text = input.value.trim();
        if (!text) return;

        if (text.toLowerCase().includes('рецепт')) {
            await fetchListFromAI(text.replace(/рецепт:/i, '').trim());
        } else {
            if (!appData["Разное"]) appData["Разное"] = [];
            appData["Разное"].push({ name: text, checked: false });
            saveAndRender();
        }
        input.value = '';
    }

    // 4. ИНТЕГРАЦИЯ С ИИ (Только DeepSeek V3.1)
    async function fetchListFromAI(topic) {
        const list = document.getElementById('shoppingList');
        const empty = document.getElementById('emptyState');
        
        empty.style.display = 'none';
        list.innerHTML = `<div class="py-20 text-center"><div class="loader"></div><p class="mt-4 font-black text-indigo-600 uppercase text-[11px] tracking-widest">DeepSeek V3.1 подбирает товары...</p></div>`;

        try {
            // Строгий промпт, чтобы ИИ не писал лишнего
            const prompt = `Ты помощник. Верни ТОЛЬКО JSON формата {"Категория":["Товар1", "Товар2"]} для темы: ${topic}. Без пояснений.`;
            
            // Используем ИМЕННО модель DeepSeek, как вы просили!
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=deepseek`);
            const rawText = await res.text();
            
            // Защита: Вырезаем только JSON, если ИИ добавил приветствие
            const jsonMatch = rawText.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error("JSON not found");
            
            const parsedData = JSON.parse(jsonMatch[0]);

            // Объединяем с текущими товарами
            for (const [cat, items] of Object.entries(parsedData)) {
                if (!appData[cat]) appData[cat] = [];
                const arr = Array.isArray(items) ? items : [items];
                arr.forEach(itemName => {
                    appData[cat].push({ name: String(itemName), checked: false });
                });
            }
            saveAndRender();
        } catch (error) {
            console.error(error);
            alert("Ошибка связи с DeepSeek. Сервер перегружен, попробуйте еще раз.");
            renderList(); // Восстанавливаем список
        }
    }

    // Запрос рецепта (Голубая кнопка с искрами)
    async function loadRecipeFromAI() {
        const input = document.getElementById('mainInput');
        const dish = input.value.replace(/рецепт:/i, '').trim();
        if(!dish) return alert("Введите название блюда в поле поиска (например: Борщ)");

        const modal = document.getElementById('recipeModal');
        const content = document.getElementById('recipeContent');
        document.getElementById('recipeTitle').innerText = dish;
        
        modal.classList.add('open');
        content.innerHTML = `<div class="py-20 text-center"><div class="loader"></div><p class="mt-4 font-bold text-slate-400">Шеф-повар пишет рецепт...</p></div>`;

        try {
            const prompt = `Напиши подробный пошаговый рецепт для блюда "${dish}". Используй HTML теги <strong> для заголовков и <p> для шагов. Не используй markdown.`;
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=deepseek`);
            content.innerHTML = await res.text();
        } catch (e) {
            content.innerHTML = "Ошибка связи. Рецепт не загружен.";
        }
    }

    // 5. ОТРИСОВКА И УПРАВЛЕНИЕ ТОВАРАМИ
    function renderList() {
        const container = document.getElementById('shoppingList');
        const empty = document.getElementById('emptyState');
        container.innerHTML = '';

        if (Object.keys(appData).length === 0) {
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';

        for (const [category, items] of Object.entries(appData)) {
            if (items.length === 0) continue; 
            
            const card = document.createElement('div');
            card.className = 'category-card';
            
            let itemsHtml = '';
            items.forEach((item, index) => {
                itemsHtml += `
                    <div class="item-row ${item.checked ? 'purchased' : ''}">
                        <input type="checkbox" class="w-6 h-6 rounded-lg border-slate-300 text-indigo-600" 
                            ${item.checked ? 'checked' : ''} 
                            onchange="toggleItemStatus('${category}', ${index})">
                        <span class="ml-4 flex-grow font-bold text-slate-700 text-[15px]">${item.name}</span>
                        <i class="fa-solid fa-trash-can text-slate-300 hover:text-red-500 cursor-pointer p-2 text-lg transition-colors" 
                            onclick="deleteItem('${category}', ${index})"></i>
                    </div>
                `;
            });

            card.innerHTML = `<div class="category-title">${category}</div>${itemsHtml}`;
            container.appendChild(card);
        }
    }

    // Глобальные функции для чекбоксов и корзины
    window.toggleItemStatus = function(category, index) {
        appData[category][index].checked = !appData[category][index].checked;
        saveAndRender();
    };

    window.deleteItem = function(category, index) {
        appData[category].splice(index, 1);
        if (appData[category].length === 0) delete appData[category];
        saveAndRender();
    };

    function saveAndRender() {
        renderList();
        saveToHistory();
        saveToCloud();
    }

    // 6. ЛОКАЛЬНАЯ ИСТОРИЯ
    function saveToHistory() {
        const historyObj = { data: appData, timestamp: new Date().getTime() };
        localStorage.setItem('smartlist_data', JSON.stringify(historyObj));
    }

    function loadFromHistory() {
        const stored = localStorage.getItem('smartlist_data');
        if (stored) {
            const historyObj = JSON.parse(stored);
            if (new Date().getTime() - historyObj.timestamp > 7 * 24 * 60 * 60 * 1000) {
                localStorage.removeItem('smartlist_data');
                appData = {};
            } else {
                appData = historyObj.data;
            }
        }
    }

    // 7. СИНХРОНИЗАЦИЯ С ОБЛАКОМ (SUPABASE)
    async function saveToCloud() {
        try {
            if (!supabase) return;
            if (!currentShareId) {
                currentShareId = 'list_' + Math.random().toString(36).substr(2, 9);
                window.history.pushState({}, '', '?list=' + currentShareId);
            }
            await supabase.from('shopping_lists').upsert([{ share_id: currentShareId, items: appData }], { onConflict: 'share_id' });
        } catch(e) { console.warn("Cloud save error"); }
    }

    async function loadFromCloud() {
        try {
            if (!supabase) return;
            const { data } = await supabase.from('shopping_lists').select('items').eq('share_id', currentShareId).single();
            if (data) {
                appData = data.items;
                saveToHistory(); 
            }
        } catch(e) { console.warn("Cloud load error"); }
    }

    // 8. ДОПОЛНИТЕЛЬНЫЕ ФУНКЦИИ
    function clearEntireList() {
        if(confirm('Точно очистить весь список покупок?')) {
            appData = {};
            currentShareId = null;
            localStorage.removeItem('smartlist_data');
            window.location.href = window.location.pathname; 
        }
    }

    function shareListToFamily() {
        saveToCloud(); // Принудительно сохраняем, чтобы появился ID
        setTimeout(() => {
            const url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => alert('Ссылка скопирована! Отправьте её в мессенджер.'));
            } else {
                alert('Скопируйте эту ссылку: ' + url);
            }
        }, 500);
    }

    function handleVoice() {
        const v = prompt('Голосовой ввод (например: "Купить хлеб" или "Рецепт оливье"):');
        if (v) {
            document.getElementById('mainInput').value = v;
            handleManualAdd();
        }
    }

    function addNewTemplate() {
        const name = prompt('Название нового блюда или шаблона:');
        if (name) {
            // Добавляем новую кнопку в слайдер
            const slider = document.querySelector('.scroll-chips');
            const newBtn = document.createElement('div');
            newBtn.className = 'template-chip';
            newBtn.innerHTML = `<i class="fa-solid fa-star text-amber-400"></i> ${name}`;
            newBtn.onclick = () => handleQuickClick(name);
            slider.insertBefore(newBtn, slider.lastElementChild);
        }
    }
</script>

</body>
</html>
